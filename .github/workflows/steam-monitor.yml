name: Steam Monitor

on:
  schedule:
    - cron: '*/10 * * * *' # Corregido a 10 min (*/5 son 5 min)
  workflow_dispatch:

jobs:
  monitor:
    runs-on: ubuntu-latest
    
    # Añadimos permisos para que la acción pueda escribir cambios en el repo
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4 # Esta versión es correcta, pero el aviso sugiere estar alerta

      - name: Setup Node.js
        uses: actions/setup-node@v4 # Actualizado de v3 a v4
        with:
          node-version: '24' # Actualizado a la versión recomendada

      - name: Install dependencies
        run: npm install

      - name: Install Playwright browsers
        run: npx playwright install --with-deps # --with-deps ayuda en entornos Linux

      - name: Run Steam Monitor
        env:
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true # Forzamos el uso de Node 24
          WEBHOOK_URLS_CHANGES: ${{ secrets.WEBHOOK_URLS_CHANGES }}
          WEBHOOK_URL_ERRORS: ${{ secrets.WEBHOOK_URL_ERRORS }}
        run: node monitor.js

      - name: Commit estado.json if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add estado.json
          git diff --cached --quiet || (git commit -m "Update estado.json" && git push)
